# owox-harness 配布 (`control/docs/decisions/20260621-Phase10-配布とrelease正本.md`)。
# main の control/.owox-version 変更で 4 種を native runner でビルドし、SHA256SUMS を添えて Release を切る。
name: release

on:
  push:
    branches:
      - main
    paths:
      - control/.owox-version

permissions:
  contents: write

jobs:
  prepare:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_version: ${{ steps.version.outputs.release_version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - name: read .owox-version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$(tr -d '[:space:]' < control/.owox-version)"
          if ! printf '%s\n' "$tag" | grep -Eq '^owox-v[0-9]+[0-9A-Za-z.+-]*$'; then
            echo "control/.owox-version must be owox-v<version>: ${tag}" >&2
            exit 1
          fi

          version="${tag#owox-v}"
          should_release=true
          if gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            should_release=false
          fi

          {
            echo "release_tag=${tag}"
            echo "release_version=${version}"
            echo "should_release=${should_release}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: control
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar
            use_musl_tools: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: install rust target
        run: rustup target add ${{ matrix.target }}

      - name: install musl tools
        if: matrix.use_musl_tools == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: inject release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["RELEASE_VERSION"]
          updated, count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("workspace.package.version not found")
          path.write_text(updated, encoding="utf-8")
          PY

      - name: build
        run: cargo build --release --bin owox --target ${{ matrix.target }}

      - name: verify built version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.release_version }}
        run: |
          exe="target/${{ matrix.target }}/release/owox"
          if [ "${{ runner.os }}" = "Windows" ]; then
            exe="${exe}.exe"
          fi
          got="$("$exe" --version)"
          test "$got" = "owox ${RELEASE_VERSION}"

      - name: package (unix)
        if: matrix.archive == 'tar'
        run: |
          tar -czf "owox-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" owox

      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/owox.exe" `
            -DestinationPath "owox-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: owox-${{ matrix.target }}
          path: control/owox-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: publish release
    needs: [prepare, build]
    if: needs.prepare.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: checksums
        run: |
          cd dist
          sha256sum owox-* > SHA256SUMS
          cat SHA256SUMS

      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" \
              dist/owox-* dist/SHA256SUMS \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "${RELEASE_TAG}" \
              dist/owox-* dist/SHA256SUMS \
              --repo "${{ github.repository }}" \
              --target "${GITHUB_SHA}" \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
