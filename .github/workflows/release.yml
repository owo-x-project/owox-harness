# owox-harness 配布 (`control/docs/decisions/20260621-Phase10-配布とrelease正本.md`)。
# tag owox-v* の push で 4 種を native runner でビルドし、SHA256SUMS を添えて Release を切る。
name: release

on:
  push:
    tags:
      - "owox-v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: control
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar
            use_musl_tools: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: install rust target
        run: rustup target add ${{ matrix.target }}

      - name: install musl tools
        if: matrix.use_musl_tools == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: derive release version
        shell: bash
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME#owox-v}" >> "$GITHUB_ENV"

      - name: inject release version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          path = Path("Cargo.toml")
          text = path.read_text(encoding="utf-8")
          version = os.environ["RELEASE_VERSION"]
          updated, count = re.subn(
              r'(?m)^version = "[^"]+"$',
              f'version = "{version}"',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit("workspace.package.version not found")
          path.write_text(updated, encoding="utf-8")
          PY

      - name: build
        run: cargo build --release --bin owox --target ${{ matrix.target }}

      - name: verify built version
        shell: bash
        run: |
          exe="target/${{ matrix.target }}/release/owox"
          if [ "${{ runner.os }}" = "Windows" ]; then
            exe="${exe}.exe"
          fi
          got="$("$exe" --version)"
          test "$got" = "owox ${RELEASE_VERSION}"

      - name: package (unix)
        if: matrix.archive == 'tar'
        run: |
          tar -czf "owox-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" owox

      - name: package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/owox.exe" `
            -DestinationPath "owox-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: owox-${{ matrix.target }}
          path: control/owox-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: checksums
        run: |
          cd dist
          sha256sum owox-* > SHA256SUMS
          cat SHA256SUMS

      - name: publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" \
              dist/owox-* dist/SHA256SUMS \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "${{ github.ref_name }}" \
              dist/owox-* dist/SHA256SUMS \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes
          fi

  bump-control-version:
    name: bump control version
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: pin control harness to released version
        run: echo "${{ github.ref_name }}" > control/.owox-version

      - name: create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          base: ${{ github.event.repository.default_branch }}
          branch: automation/bump-control-${{ github.ref_name }}
          delete-branch: true
          commit-message: "chore(control): bump owox version to ${{ github.ref_name }}"
          title: "chore(control): bump owox version to ${{ github.ref_name }}"
          body: |
            - released version: `${{ github.ref_name }}`
            - source release: `https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}`
            - after merge, devcontainer post-create installs this fixed version
