services:
  control:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    depends_on:
      headroom:
        condition: service_started
    environment:
      HEADROOM_BASE_URL: http://headroom:8787
      HEADROOM_TELEMETRY: "off"
      OPENAI_BASE_URL: http://headroom:8787/v1
      PATH: /usr/local/rtk-shims:/usr/local/share/nvm/current/bin:/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      OWOX_RTK_SHIM: "1"
      RTK_TELEMETRY_DISABLED: "1"
    volumes:
      - ..:/workspace/product:cached
      - ${HOME}/.gitconfig:/root/.gitconfig:ro,cached

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    entrypoint: ["headroom", "proxy"]
    command: ["--host", "0.0.0.0", "--port", "8787"]
    environment:
      HEADROOM_CONFIG_DIR: /tmp/headroom-home/.headroom/config
      HEADROOM_HOST: 0.0.0.0
      HEADROOM_TELEMETRY: "off"
      HEADROOM_WORKSPACE_DIR: /tmp/headroom-home/.headroom
      HOME: /tmp/headroom-home
    expose:
      - "8787"
    restart: unless-stopped
    volumes:
      - ..:/workspace:cached
      - headroom-home:/tmp/headroom-home/.headroom

volumes:
  headroom-home:
