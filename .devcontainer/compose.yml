services:
  control:
    build:
      context: .
      dockerfile: Dockerfile
    command: sleep infinity
    environment:
      PATH: /usr/local/rtk-shims:/usr/local/share/nvm/current/bin:/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      OWOX_RTK_SHIM: "1"
      RTK_TELEMETRY_DISABLED: "1"
    volumes:
      - ..:/workspace/product:cached
      - ${HOME}/.gitconfig:/tmp/host.gitconfig:ro,cached
      - codex-data:/root/.codex
      - claude-data:/root/.claude
      - claude-state-data:/root/.claude-state
      - anthropic-config-data:/root/.config/anthropic
      - npm-global-data:/root/.npm-global

volumes:
  codex-data:
  claude-data:
  claude-state-data:
  anthropic-config-data:
  npm-global-data:
